name: Deploy to EC2

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ec2_ssh_key
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Prepare SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem

      - name: Test SSH connection
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o ConnectTimeout=10 \
              -i ~/.ssh/ec2_key.pem \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "echo SSH connected && whoami"

      - name: Run deploy script on EC2
        env:
          DEPLOY_SCRIPT_PATH: /home/ubuntu/apps/visitor-counter/deploy.sh
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i ~/.ssh/ec2_key.pem \
              "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" \
              "bash ${DEPLOY_SCRIPT_PATH}"
